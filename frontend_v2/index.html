<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="theme-color" content="#10b981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Analize.Online" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://analize.online" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Analize.Online - Platforma ta de sănătate" />
    <meta property="og:description" content="Toate analizele tale medicale, într-un singur loc. Analiză AI de la specialiști virtuali." />
    <meta property="og:url" content="https://analize.online" />
    <meta property="og:site_name" content="Analize.Online" />
    <meta property="og:image" content="https://analize.online/healthy.svg" />
    <meta property="og:locale" content="ro_RO" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Analize.Online - Platforma ta de sănătate" />
    <meta name="twitter:description" content="Toate analizele tale medicale, într-un singur loc. Analiză AI de la specialiști virtuali." />
    <meta name="twitter:image" content="https://analize.online/healthy.svg" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/healthy.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- html2canvas for screenshot capture in feedback button -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Register service worker for push notifications -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
