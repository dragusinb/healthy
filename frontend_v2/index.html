    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Ce este Analize.Online?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Analize.Online este prima platformă din România care agregă automat analizele medicale de la mai multe laboratoare (Regina Maria, Synevo, MedLife, Sanador) într-un singur loc. Extrage biomarkerii din PDF-uri folosind inteligență artificială și oferă interpretare medicală cu 6 specialiști virtuali."
          }
        },
        {
          "@type": "Question",
          "name": "Ce laboratoare sunt suportate?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Platforma suportă în prezent Regina Maria, Synevo, MedLife și Sanador. Conectezi contul tău de pacient și analizele sunt descărcate automat."
          }
        },
        {
          "@type": "Question",
          "name": "Este gratuit?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Da, planul gratuit include conectarea conturilor de laborator, stocarea documentelor și extracția biomarkerilor. Planul Premium costă 29 RON/lună (sau 199 RON/an) și include rapoarte AI nelimitate de la 6 specialiști virtuali, alerte personalizate și funcții avansate."
          }
        },
        {
          "@type": "Question",
          "name": "Datele mele sunt sigure?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Da. Fiecare utilizator are propriul vault criptat cu AES-256-GCM. Cheia de criptare este derivată din parola ta, ceea ce înseamnă că nici administratorii platformei nu pot accesa datele tale medicale. Documentele, biomarkerii și credențialele sunt toate criptate individual."
          }
        },
        {
          "@type": "Question",
          "name": "Cum funcționează analiza AI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "După ce analizele sunt importate și biomarkerii extrasi, 6 specialiști virtuali AI (Generalist, Cardiolog, Endocrinolog, Hematolog, Hepatolog, Nefrolog) analizează rezultatele tale. Fiecare specialist identifică potențiale probleme din domeniul său și oferă recomandări personalizate."
          }
        },
        {
          "@type": "Question",
          "name": "Pot să-mi șterg contul?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Da, platforma este conformă GDPR. Poți să-ți ștergi complet contul din setări, iar toate datele tale (documente, biomarkeri, rapoarte, credențiale) vor fi șterse permanent și irecuperabil."
          }
        }
      ]
    }
    </script>
